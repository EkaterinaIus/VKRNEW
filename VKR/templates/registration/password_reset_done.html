{% extends 'base.html' %}
{% block title %}Письмо отправлено — Читайка{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4 text-center">
          <div class="auth-icon">📬</div>
          <h2 class="fw-bold">Письмо отправлено!</h2>
          <p class="text-muted">
            Если аккаунт с таким email существует, мы отправили на него
            ссылку для сброса пароля. Проверьте почту (и папку «Спам»).
          </p>
          <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Вернуться ко входу
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
